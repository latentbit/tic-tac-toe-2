<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-toe</title>
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tic-tac-toe</h1>
    <div class="main">
        <div class="buttons-container">
            <button class="redo">Redo</button>
            <button 
                class="new-game"
                command="show-modal"
                commandfor="new-game-dialog"
            >
                New game
            </button>
        </div>
        <dialog
            id="new-game-dialog"
            closedby="any"
        >
            <form action="">
                <h2>Create board</h2>
                <p>
                    <label for="rowNumber">
                        Number of rows: 
                    </label>
                    <input 
                        autofocus 
                        type="number" 
                        name="rowNumber" 
                        id="rowNumber"
                        min="1"
                        max="50"
                        required
                    >
                </p>
                <p>
                    <label for="columnNumber">
                        Number of columns: 
                    </label>
                    <input 
                        type="number" 
                        name="columnNumber" 
                        id="columnNumber"
                        min="1"
                        max="50"
                        required
                    >
                </p>
                <p>
                    <label for="win-condition-number">
                        Win condition:
                    </label>
                    <input 
                        type="number" 
                        name="winConditionNumber" 
                        id="win-condition-number"
                        min="3"
                        max="10"
                        required
                    >
                </p>
                <button type="submit">Create</button>
            </form>
        </dialog>
        <div class="game-display">
            <div class="board" closedby="any">
            </div>
        </div>
    </div>
</body>
</html>
